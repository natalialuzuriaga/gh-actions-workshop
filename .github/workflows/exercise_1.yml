# Fill in the blanks to create a workflow that:
# - Runs upon reopened pull requests that include changes to .md files
# - Uses macOS as the runner environment

name: My first workflow!

on: 
    pull_request:
        types: [opened, reopened]
        paths:
        - '**/*.md'
        
        branches:
            - main
            - exercise-1

jobs:
    my-first-job:
        runs-on: macos-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: List changed markdown files
              run: |
                echo "Markdown files changed in this PR:"
                git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.md$' || echo "(none found)"
            